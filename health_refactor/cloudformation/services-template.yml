AWSTemplateFormatVersion: 2010-09-09
Transform: "AWS::Serverless-2016-10-31"
Description: Infrastructure for SupportOS Backend

Parameters:
  Env:
    Description: The environment (dev, test, prod etc.) Used as resource names and tags
    Type: String
  ProjectId:
    Description: The unique id or name of this project. Used in resource names and tags
    Type: String
    Default: supportos
  OrgId:
    Description: The unique id or name of this organization. Used in referencing shared resources like the ALB security group
    Type: String
    Default: "afriex"
  BackendImage:
    Type: String
    Description: The full image:tag for the image to push to the task
  DefaultDesiredTaskCount:
    Type: Number
    Description: The number of ecs tasks to run by default (before scaling kicks in)
    Default: 1
  ListenerRulePriority:
    Type: Number
    Description: The priority of the listener rule
    Default: 1
  DomainName:
    Type: String
    Description: The domain name of the service
  ParameterStoreNamePrefix:
    Type: String
    Description: The prefix for the parameter store.
    Default: supportos
  # SecretsArn:
  #   Type: String
  #   Description: Secrets ARN 

# Conditions:
#   IsDev: !Equals [!Ref Env, "dev"]

Resources:
  FargateExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: [ecs-tasks.amazonaws.com]
            Action: [sts:AssumeRole]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: TaskRolePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: "logs:CreateLog*"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "ssmmessages:CreateControlChannel"
                  - "ssmmessages:CreateDataChannel"
                  - "ssmmessages:OpenControlChannel"
                  - "ssmmessages:OpenDataChannel"
                  - "ssm:GetParameters"
                Resource: "*"
              - Effect: Allow
                Action: "secretsmanager:*"
                Resource: "*"
              - Effect: Allow
                Action: "kms:Decrypt"
                Resource: "*"

  FargateTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: [ecs-tasks.amazonaws.com]
            Action: [sts:AssumeRole]
      Policies:
        - PolicyName: TaskRolePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: "logs:CreateLogStream"
                Resource: "*"
              - Effect: Allow
                Action: "logs:PutLogEvents"
                Resource: "*"
              - Effect: Allow
                Action: "ssm:*"
                Resource: "*"
              - Effect: Allow
                Action: "secretsmanager:*"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "ssmmessages:CreateControlChannel"
                  - "ssmmessages:CreateDataChannel"
                  - "ssmmessages:OpenControlChannel"
                  - "ssmmessages:OpenDataChannel"
                Resource: "*"
              - Effect: Allow
                Action: "kms:Decrypt"
                Resource: "*"

  FargateCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ProjectId}-${Env}"
      CapacityProviders:
        - FARGATE
      ServiceConnectDefaults:
        Namespace: !Sub "${ProjectId}-${Env}"

  BackendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectId}-${Env}-backend
      Cpu: "2048"             # You can specify "256", "512", "1024", etc.
      Memory: "4096"          # You can specify "512", "1024", "2048", etc.
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt FargateExecutionRole.Arn
      TaskRoleArn: !GetAtt FargateTaskRole.Arn
      ContainerDefinitions:
        - Name: !Sub "${ProjectId}-${Env}"
          Image: !Ref BackendImage
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Name: api
          HealthCheck:
            Command:
              - "CMD-SHELL"
              - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)\""
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          Environment:
            - Name: APP_ENV
              Value: !Ref Env
            - Name: APP_PORT
              Value: "8000"
            - Name: PORT
              Value: "8000"
          Secrets:
            - Name: APP_NAME
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/APP_NAME"
            - Name: APP_SLUG
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/APP_SLUG"
            - Name: APP_DEBUG
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/APP_DEBUG"
            - Name: LOG_LEVEL
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/LOG_LEVEL"
            - Name: DATABASE_URL
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/DATABASE_URL"
            - Name: DATABASE_SQL_ECHO
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/DATABASE_SQL_ECHO"
            - Name: DATABASE_POOL_PRE_PING
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/DATABASE_POOL_PRE_PING"
            - Name: DATABASE_POOL_RECYCLE
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/DATABASE_POOL_RECYCLE"
            - Name: DATABASE_POOL_SIZE
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/DATABASE_POOL_SIZE"
            - Name: DATABASE_MAX_OVERFLOW
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/DATABASE_MAX_OVERFLOW"
            - Name: REDIS_URL
