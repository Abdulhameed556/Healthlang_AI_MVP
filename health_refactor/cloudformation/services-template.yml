            - Name: INVITATION_EXPIRE_HOURS
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/INVITATION_EXPIRE_HOURS"
            - Name: PASSWORD_RESET_EXPIRE_HOURS
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/PASSWORD_RESET_EXPIRE_HOURS"
            - Name: CORS_ORIGINS
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/CORS_ORIGINS"
