            - Name: JWT_ALGORITHM
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/JWT_ALGORITHM"
            - Name: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
