              awslogs-create-group: true
              awslogs-group: !Sub /ecs/${ProjectId}-${Env}/dramatiq
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          LinuxParameters:
            InitProcessEnabled: true

  MigrateTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectId}-${Env}-migrate
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt FargateExecutionRole.Arn
      TaskRoleArn: !GetAtt FargateTaskRole.Arn
      ContainerDefinitions:
        - Name: !Sub "${ProjectId}-${Env}-migrate"
          Image: !Ref BackendImage
          Essential: true
          EntryPoint:
            - /bin/sh
            - -c
          Command:
            - "PYTHONPATH=. alembic -c backend/src/infrastructure/database/migrations/alembic.ini upgrade head"
          Environment:
            - Name: APP_ENV
              Value: !Ref Env
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/DATABASE_URL"
            - Name: JWT_SECRET_KEY
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/JWT_SECRET_KEY"
            - Name: API_TOOL_SECRETS_ENCRYPTION_KEY
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/API_TOOL_SECRETS_ENCRYPTION_KEY"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-create-group: true
              awslogs-group: !Sub /ecs/${ProjectId}-${Env}/migrate
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          LinuxParameters:
            InitProcessEnabled: true
          
  BackEndService:
    Type: AWS::ECS::Service
    DependsOn:
      - FargateCluster
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MinInstancesInService: 1
        MaxBatchSize: 1
        PauseTime: PT0S
    Properties:
      Cluster: !Ref FargateCluster
      ServiceName: !Sub "${ProjectId}-${Env}-backend"
      TaskDefinition: !Ref BackendTaskDefinition
      DesiredCount: !Ref DefaultDesiredTaskCount
      LaunchType: FARGATE
      HealthCheckGracePeriodSeconds: 120
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      LoadBalancers:
        - ContainerName: !Sub ${ProjectId}-${Env}
          ContainerPort: 8000
          TargetGroupArn: !Ref BackEndTargetGroup
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - "{{resolve:ssm:/devops/private-subnet-1}}"
            - "{{resolve:ssm:/devops/private-subnet-2}}"
            - "{{resolve:ssm:/devops/private-subnet-3}}"
          SecurityGroups:
            - !Ref FargateServiceSecurityGroup

  DramatiqService:
    Type: AWS::ECS::Service
    DependsOn:
      - FargateCluster
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MinInstancesInService: 1
        MaxBatchSize: 1
        PauseTime: PT0S
    Properties:
      Cluster: !Ref FargateCluster
      ServiceName: !Sub "${ProjectId}-${Env}-dramatiq"
      TaskDefinition: !Ref DramatiqTaskDefinition
      DesiredCount: !Ref DefaultDesiredTaskCount
      LaunchType: FARGATE
      HealthCheckGracePeriodSeconds: 120
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - "{{resolve:ssm:/devops/private-subnet-1}}"
            - "{{resolve:ssm:/devops/private-subnet-2}}"
            - "{{resolve:ssm:/devops/private-subnet-3}}"
          SecurityGroups:
            - !Ref DramatiqFargateServiceSecurityGroup
  
  FargateServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Access to the Backend Fargate services
      VpcId: "{{resolve:ssm:/devops/vpc-id}}"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: 
            Fn::ImportValue: !Sub '${OrgId}-AlbSecurityGroupId'
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 0
          ToPort: 65535
          CidrIp: 0.0.0.0/0

  DramatiqFargateServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Access to the Dramatiq Fargate services
      VpcId: "{{resolve:ssm:/devops/vpc-id}}"
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 0
          ToPort: 65535
          CidrIp: 0.0.0.0/0

  MigrateSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Access for one-off database migration ECS tasks
      VpcId: "{{resolve:ssm:/devops/vpc-id}}"
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 0
          ToPort: 65535
          CidrIp: 0.0.0.0/0

  BackEndTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 8000
      Protocol: HTTP
      VpcId: "{{resolve:ssm:/devops/vpc-id}}"
      TargetType: ip
      HealthCheckPath: "/api/v1/health"
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200

  BackendListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackEndTargetGroup
      Conditions:
        - Field: host-header
          Values:
            - !Ref DomainName
      ListenerArn:
        Fn::ImportValue: !Sub '${OrgId}-TlsListenerArn'
      Priority: !Ref ListenerRulePriority
# Outputs for ECS cluster (used by one-off migrate tasks, etc.)
Outputs:
  ECSClusterArn:
    Description: "ARN of the ECS Cluster"
    Value: !Ref FargateCluster
    Export:
      Name: !Sub "${ProjectId}-${Env}-ClusterArn"
  
  ECSClusterName:
    Description: "Name of the ECS Cluster"
    Value: !Ref FargateCluster
    Export:
      Name: !Sub "${ProjectId}-${Env}-ClusterName"

  MigrateTaskDefinitionFamily:
    Description: "ECS task definition family for one-off Alembic migrations"
    Value: !Sub "${ProjectId}-${Env}-migrate"
    Export:
      Name: !Sub "${ProjectId}-${Env}-MigrateTaskFamily"

  MigrateSecurityGroupId:
    Description: "Security group for one-off migration ECS tasks"
    Value: !Ref MigrateSecurityGroup
    Export:
      Name: !Sub "${ProjectId}-${Env}-MigrateSecurityGroupId"
