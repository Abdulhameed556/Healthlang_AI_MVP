              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/PINECONE_INDEX_NAME"
            - Name: DRAMATIQ_BROKER_URL
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/DRAMATIQ_BROKER_URL"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-create-group: true
              awslogs-group: !Sub /ecs/${ProjectId}-${Env}/backend
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          LinuxParameters:
            InitProcessEnabled: true
          
  DramatiqTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectId}-${Env}-dramatiq
      Cpu: "2048"             # You can specify "256", "512", "1024", etc.
      Memory: "4096"          # You can specify "512", "1024", "2048", etc.
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt FargateExecutionRole.Arn
      TaskRoleArn: !GetAtt FargateTaskRole.Arn
      ContainerDefinitions:
        - Name: !Sub "${ProjectId}-${Env}-dramatiq"
          Image: !Ref BackendImage
          Essential: true
          EntryPoint:
            - /bin/sh
            - -c
          Command:
            - "PYTHONPATH=. dramatiq ai.src.infrastructure.workers.worker --processes 1 --threads 8"
          HealthCheck:
            Command:
              - "CMD-SHELL"
              - "echo ok"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          Environment:
            - Name: APP_ENV
              Value: !Ref Env
            - Name: DATABASE_USE_NULL_POOL
