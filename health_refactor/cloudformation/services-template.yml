            - Name: BACKEND_INTERNAL_API_KEY
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ParameterStoreNamePrefix}/${Env}/BACKEND_INTERNAL_API_KEY"
            - Name: INTERNAL_API_KEY
