version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: supportos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
    volumes: [pg_data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  app:
    build: .
    depends_on: [db, redis]
    env_file: .env
    ports: ["8000:8000"]
    volumes: [.:/app]
    command: uvicorn run:root_app --host 0.0.0.0 --port 8000 --reload

volumes:
  pg_data:
