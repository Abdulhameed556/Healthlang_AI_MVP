version: "3.9"
services:
  ai:
    build: .
    depends_on: [redis, pgvector]
    env_file: .env
    ports: ["8001:8001"]
    volumes: [.:/app]
    command: uvicorn src.main:app --host 0.0.0.0 --port 8001 --reload

  worker:
    build: .
    depends_on: [redis, pgvector]
    env_file: .env
    volumes: [.:/app]
    command: dramatiq src.infrastructure.workers.broker --processes 1 --threads 8

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ai_vectors
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports: ["5433:5432"]
    volumes: [pgvector_data:/var/lib/postgresql/data]

volumes:
  pgvector_data:
